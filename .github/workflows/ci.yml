name: Laravel CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - dev
      - develop
      - development
      - qa
      - uat
      - main
      - master

permissions:
  contents: write

env:
  PHP_VERSION: "8.4"
  LONG_LIVED_BRANCHES: '["dev","develop","development","qa","uat","main","master"]'

jobs:
  tests:
    name: Tests and coverage gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: xdebug
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare CI environment
        run: |
          cp .env.ci .env
          php artisan key:generate --force
          mkdir -p build/logs

      - name: Run Laravel tests with coverage
        run: vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Enforce minimum coverage
        run: php scripts/check-coverage.php build/logs/clover.xml 50

  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          extensions: mbstring, dom, fileinfo, pdo_sqlite, sqlite3
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare CI environment
        run: |
          cp .env.ci .env
          php artisan key:generate --force

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --error-format=github --memory-limit=1G

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          extensions: mbstring, dom, fileinfo
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check formatting on long-lived branches and PRs
        if: github.event_name == 'pull_request' || contains(fromJSON(env.LONG_LIVED_BRANCHES), github.ref_name)
        run: vendor/bin/pint --test app database routes tests

      - name: Format feature branches
        if: github.event_name == 'push' && !contains(fromJSON(env.LONG_LIVED_BRANCHES), github.ref_name)
        run: vendor/bin/pint app database routes tests

      - name: Commit formatting changes
        if: github.event_name == 'push' && !contains(fromJSON(env.LONG_LIVED_BRANCHES), github.ref_name)
        run: |
          if git diff --quiet; then
            echo "No formatting changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app database routes tests
          git commit -m "style: apply Laravel Pint"
          git push

  deploy-simulation:
    name: Deploy simulation
    runs-on: ubuntu-latest
    needs:
      - tests
      - static-analysis
      - lint
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'develop' || github.ref_name == 'development' || github.ref_name == 'qa' || github.ref_name == 'uat' || github.ref_name == 'main' || github.ref_name == 'master')
    environment:
      name: ${{ (github.ref_name == 'main' || github.ref_name == 'master') && 'production' || 'non-production' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select environment file
        run: |
          case "${GITHUB_REF_NAME}" in
            dev|develop|development)
              ENV_NAME="dev"
              ;;
            qa|uat)
              ENV_NAME="uat"
              ;;
            main|master)
              ENV_NAME="prod"
              ;;
            *)
              echo "Unsupported deployment branch: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac
          cp ".env.${ENV_NAME}" .env
          echo "DEPLOY_ENV=${ENV_NAME}" >> "${GITHUB_ENV}"

      - name: Deploy
        run: echo "Deploying to ${DEPLOY_ENV} with .env.${DEPLOY_ENV}"

  notify:
    name: Notify maintainers
    runs-on: ubuntu-latest
    needs:
      - tests
      - static-analysis
      - lint
      - deploy-simulation
    if: always()

    steps:
      - name: Send optional webhook notification
        env:
          MAINTAINER_WEBHOOK_URL: ${{ secrets.MAINTAINER_WEBHOOK_URL }}
          TESTS_RESULT: ${{ needs.tests.result }}
          STATIC_ANALYSIS_RESULT: ${{ needs.static-analysis.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          DEPLOY_RESULT: ${{ needs.deploy-simulation.result }}
        run: |
          MESSAGE="Pipeline ${GITHUB_WORKFLOW} for ${GITHUB_REF_NAME}: tests=${TESTS_RESULT}, static=${STATIC_ANALYSIS_RESULT}, lint=${LINT_RESULT}, deploy=${DEPLOY_RESULT}"
          echo "${MESSAGE}"
          if [ -n "${MAINTAINER_WEBHOOK_URL}" ]; then
            curl -sS -X POST -H "Content-Type: application/json" \
              -d "{\"text\":\"${MESSAGE}\"}" \
              "${MAINTAINER_WEBHOOK_URL}"
          else
            echo "MAINTAINER_WEBHOOK_URL is not configured; notification skipped."
          fi
